trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. Instala o Azure Functions Core Tools na máquina do pipeline
- task: FuncToolsInstaller@0
  displayName: 'Instalar Azure Functions Core Tools'
  inputs:
    version: 'latest'

# 2. Restaura e compila o código do seu projeto
- task: DotNetCoreCLI@2
  displayName: 'Restaurar e Buildar'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '--configuration Release'

# 3. Executa as Functions em segundo plano e dispara os testes contra os endpoints
- script: |
    echo "Navegando para a pasta do projeto da Azure Function..."
    # SUBSTITUA 'NomeDoSeuProjeto' pelo nome real da pasta onde está o seu host.json
    cd src/NomeDoSeuProjeto 

    echo "Iniciando a Azure Function localmente no agente..."
    # 'func start' roda em segundo plano (&) para o pipeline não travar esperando
    func start --csharp & 
    
    echo "Aguardando 15 segundos para a Function inicializar totalmente..."
    sleep 15
    
    echo "Voltando para a raiz para executar os testes..."
    cd ../..
    
    echo "Executando os testes de integração..."
    dotnet test --configuration Release --logger:"trx;LogFileName=test_results.trx"
  displayName: 'Executar e Testar Endpoints'

# 4. Publica os resultados do teste na interface gráfica do Azure DevOps
- task: PublishTestResults@2
  displayName: 'Publicar Relatório de Testes'
  inputs:
    testResultsFormat: 'VSTest'
    testResultsFiles: '**/test_results.trx'
  condition: always() # Garante que roda mesmo se algum teste falhar
