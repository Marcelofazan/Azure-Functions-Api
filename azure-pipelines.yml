trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. Instala o Azure Functions Core Tools na máquina do pipeline
- task: FuncToolsInstaller@0
  displayName: 'Instalar Azure Functions Core Tools'
  inputs:
    version: 'latest'

# 2. Restaura e compila o código do seu projeto
- task: DotNetCoreCLI@2
  displayName: 'Restaurar e Buildar'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '--configuration Release'

- script: |
    echo "=== Buscando a pasta raiz do projeto Azure Function ==="
    # Localiza dinamicamente a pasta que contém o arquivo host.json
    FUNCTION_DIR=$(dirname $(find . -name "host.json" -print -quit))
    
    if [ -z "$FUNCTION_DIR" ]; then
      echo "ERRO: Não foi possível encontrar nenhum arquivo host.json no repositório!"
      exit 1
    fi
    
    echo "Pasta da Function encontrada: $FUNCTION_DIR"
    
    echo "=== Iniciando a Azure Function localmente no agente ==="
    cd "$FUNCTION_DIR"
    func start --csharp & 
    
    echo "Aguardando 15 segundos para a Function inicializar totalmente..."
    sleep 15
    
    echo "=== Retornando para a raiz do repositório ==="
    cd "$BUILD_SOURCESDIRECTORY"
    
    echo "=== Buscando o arquivo de Solução (.sln) ou Projeto (.csproj) ==="
    # Localiza o arquivo de solução principal para rodar os testes
    SOLUTION_FILE=$(find . -name "*.sln" -print -quit)
    if [ -z "$SOLUTION_FILE" ]; then
      SOLUTION_FILE=$(find . -name "*.csproj" -print -quit)
    fi

    echo "Executando os testes usando: $SOLUTION_FILE"
    dotnet test "$SOLUTION_FILE" --configuration Release --logger:"trx;LogFileName=test_results.trx"
  displayName: 'Executar e Testar Endpoints'

# 4. Publica os resultados do teste na interface gráfica do Azure DevOps
- task: PublishTestResults@2
  displayName: 'Publicar Relatório de Testes'
  inputs:
    testResultsFormat: 'VSTest'
    testResultsFiles: '**/test_results.trx'
  condition: always() # Garante que roda mesmo se algum teste falhar
